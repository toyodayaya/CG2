name: DevelopmentBuild

on:
 push:
  branches:
    - master

env:
  # リポジトリのルートディレクトリを基点としたソリューションファイルのパス
  SOLUSION_FILE_PATH: project/CG2.sln
  # Visual Studioの構成
  CONFIGURATION: Development

jobs:
  bulid:
     runs-on: windows-2025-vs2026

     steps:
       - name: Checkout
         uses: actions/checkout@v6

       - name: Add MSBuild to PATH
         uses: microsoft/setup-msbuild@v3
         with:
           msbuild-architecture: x64

       - name: Build
         run: |
           msbuild ${{env.SOLUSION_FILE_PATH}} /p:Platform=x64,Configuration=${{env.CONFIGURATION}}
